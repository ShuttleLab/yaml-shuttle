# Static export → Cloudflare Pages (static output in ./out).
# This is a CF Pages project with Git auto-deploy. The dashboard build command
# MUST be `npx next build` (NOT `npx @cloudflare/next-on-pages`); output dir `out`.
# `pages_build_output_dir` below is the source of truth for the output location.
name = "yaml-shuttle"
compatibility_date = "2026-01-01"
pages_build_output_dir = "out"
