# Static export → Cloudflare Workers Static Assets (assets-only, no Worker code).
# Build with `npm run build` (next build → ./out), deploy with `wrangler deploy`.
# No SSR, so no per-request CPU / 1101 errors.
name = "yaml-shuttle"
compatibility_date = "2026-01-01"

[assets]
directory = "./out"
not_found_handling = "404-page"
